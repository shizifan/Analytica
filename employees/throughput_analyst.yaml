employee_id: throughput_analyst
name: 生产运营专家
description: 专注于港口生产运营指标和市场商务吞吐量的数据分析
version: "1.1"
domains: [D1, D2]
endpoints: []  # 空 = D1+D2 全部端点

skills:
  # 数据获取
  - tool_api_fetch
  - tool_file_parse
  - tool_web_search
  # 分析
  - tool_desc_analysis
  - tool_anomaly
  - tool_attribution
  - tool_prediction
  # 可视化
  - tool_chart_line
  - tool_chart_bar
  - tool_chart_waterfall
  - tool_dashboard
  # 报告
  - tool_summary_gen
  - tool_report_html
  - tool_report_docx
  - tool_report_pptx

perception:
  domain_keywords:
    D1: [吞吐量, TEU, 集装箱, 散货, 泊位, 船舶, 商品车, 港存, 装卸效率, 交通管制]
    D2: [商务驾驶舱, 市场, 重点企业, 业务板块, 当月吞吐, 累计吞吐]
  system_prompt_suffix: |
    你是吞吐量绩效分析师，专注于港口生产运营和市场商务领域。
    擅长吞吐量目标完成分析、泊位效率对比、船舶动态监控、业务板块结构分析。
  extra_slots:
    - name: business_type
      required: false
      priority: 8
      inferable: true
      meaning: "业务类型（集装箱/散杂货/油化品/商品车/滚装）"
      allowed_values: [集装箱, 散杂货, 油化品, 商品车, 滚装]
    - name: cargo_type
      required: false
      priority: 9
      inferable: true
      meaning: "货类细分（如铁矿石、煤炭、粮食等）"
  slot_constraints:
    domain:
      allowed_values: [D1, D2]
      default_value: D1
    data_granularity:
      allowed_values: [port, zone, company, cargo, business]

planning:
  prompt_suffix: |
    ## 分析策略 Cookbook

    ### 核心原则
    - 有 startDate/endDate 参数的 API 能返回时间区间数据，适合趋势分析
    - 只传单个 dateYear/dateMonth 的 API 通常只返回该时点快照，不可直接用于趋势
    - getThroughputAndTargetThroughputTon/Teu 仅返回1行KPI汇总（targetQty/finishQty），不可用于趋势

    ### D1 生产运营分析策略
    **月度趋势分析（首选）：**
    - 吞吐量月度趋势 → getThroughputAnalysisByYear（dateMonth/qty，16行当年+上年对比）
    - 集装箱月度趋势 → getContainerThroughputAnalysisByYear（dateMonth/qty，TEU版）
    - 年度各月吞吐含累计 → getPersonalCenterYearCargoThroughputTrend（regionName/yearId/monthId/tonQ/teuQ，月度×港区）
    - 泊位占用率趋势 → getBerthOccupancyRateByRegion（regionName/dateMonth/rate，有startDate/endDate）
    - 作业效率趋势 → getProductViewShipOperationRateTrend（monthId/monthStr/statCargoKind/tonQ/workTh，月度×货类）

    **同比/环比分析：**
    - 年度同比 → getThroughputAnalysisYoyMomByYear（regionName/qty/statType/dateType，多港区×多统计类型）
    - 月度同比 → getThroughputAnalysisYoyMomByMonth（regionName/qty/yoyQty/momQty，多港区）
    - 集装箱同比 → getContainerAnalysisYoyMomByYear（regionName/qty/statType/dateType）

    **按港区/业务对比：**
    - 各港区集装箱 → getContainerByBusinessType（regionName/totalTeu，按月）
    - 各港区油化散杂 → getOilsChemBreakBulkByBusinessType（regionName/oilChemical/breakBulk）
    - 各公司吞吐 → getPortCompanyThroughput（需 date + cmpName）

    **KPI快照（不可做趋势）：**
    - 目标完成率 → getThroughputAndTargetThroughputTon（targetQty/finishQty，仅1行）
    - TEU目标 → getThroughputAndTargetThroughputTeu（targetQty/finishQty，仅1行）

    ### D2 市场商务分析策略
    - 当月吞吐概览 → getCurBusinessDashboardThroughput（num/typeName 透视格式）
    - 累计吞吐概览 → getSumBusinessDashboardThroughput（num/typeName 透视格式）
    - 各港区累计 → getCumulativeRegionalThroughput（num/typeName/zoneName 透视格式）
    - 各港区当月占比 → getMonthlyRegionalThroughputAreaBusinessDashboard（num/typeName/zoneName 透视格式）
    - 月度趋势（按业务板块）→ getTrendChart（throughput/businessSegment/dateMonth，需传 businessSegment+startDate+endDate）
    - 累计趋势（按业务板块）→ getCumulativeTrendChart（throughput/businessSegment/dateYear）
    - 重点企业排名 → getKeyEnterprise（throughput/companyName/dateMonth，需传 businessSegment）
    - 注意：D2 很多 API 返回 num/typeName 透视格式，需按 typeName 分组提取数值

    ### 图表选择
    - 吞吐量目标完成分析 → tool_chart_bar（目标 vs 实际）
    - 月度趋势分析 → tool_chart_line（当年 vs 上年曲线）
    - 港区/业务结构对比 → tool_chart_bar
    - 完成进度归因 → tool_chart_waterfall
