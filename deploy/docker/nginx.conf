server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # 裸访问根路径时自动跳到 /analytica/，方便内网直连调试
    location = / { return 302 /analytica/; }

    # 静态资源缓存（前缀下的 assets）
    location /analytica/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 反代到后端 app（注意 proxy_pass 末尾带 / —— 会剥掉 /analytica/ 前缀）
    location /analytica/api/ {
        proxy_pass http://app:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # WebSocket 反代
    location /analytica/ws/ {
        proxy_pass http://app:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA 入口 + fallback（放在 API/WS 之后，避免吞掉它们）
    location /analytica/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /analytica/index.html;
    }
}
