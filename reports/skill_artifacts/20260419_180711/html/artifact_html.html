<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试报告</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
body { font-family: 'Microsoft YaHei', sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; color: #333333; }
h1 { color: #1E3A5F; text-align: center; border-bottom: 3px solid #F0A500; padding-bottom: 10px; }
h2 { color: #1E3A5F; margin-top: 30px; }
h3 { color: #2D5F8A; }
.meta { text-align: center; color: #666; margin-bottom: 30px; }
.section { margin-bottom: 40px; }
.chart-container { width: 100%; height: 400px; margin: 20px 0; }
.narrative { line-height: 1.8; text-indent: 2em; }
.summary { background: #1E3A5F; color: white; padding: 20px; border-radius: 8px; margin-top: 40px; }
.summary h2 { color: #F0A500; }
table.stats { width: 100%; border-collapse: collapse; margin: 16px 0; }
table.stats th { background: #1E3A5F; color: white; padding: 8px 12px; text-align: left; font-size: 13px; }
table.stats td { padding: 8px 12px; border-bottom: 1px solid #e0e0e0; font-size: 13px; font-family: 'Calibri', monospace; }
table.stats tr:nth-child(even) { background: #F5F7FA; }
.kpi-row { display: flex; gap: 16px; margin: 16px 0; flex-wrap: wrap; }
.kpi-card { flex: 1; min-width: 180px; background: #F5F7FA; border-radius: 8px; padding: 16px; text-align: center; border-left: 4px solid #F0A500; }
.kpi-card .label { font-size: 12px; color: #546E7A; margin-bottom: 4px; }
.kpi-card .value { font-size: 28px; font-weight: bold; font-family: 'Calibri', monospace; }
.kpi-card .value.positive { color: #2E7D32; }
.kpi-card .value.negative { color: #C62828; }
.kpi-card .sub { font-size: 11px; color: #546E7A; }
</style>
</head>
<body>
<h1>测试报告</h1>
<div class="meta">Analytica | </div>
<div class="section"><h2>0. 测试</h2>
</div>
<div class="summary"><h2>总结与建议</h2>
<p>以上分析基于数据，仅供参考。</p>
</div>
</body>
</html>
